        let currentScreen = 'splash';
        let activeCategory = 'all';
        let selectedProduct = null;
        let selectedMealType = 'classic';
        let cartItems = [];
        let detailQuantity = 1;
        let searchTerm = '';
        let toastMessage = null;
        let currentCheckoutStep = 0;
        let selectedLocation = { lat: 30.1504, lng: 31.4727, address: 'العبور، ممشى الحي الأول' };
        let selectedPayment = 'cash';
        let orderNumber = 'HULK-' + Math.floor(Math.random() * 100000);
        
        let renderRoot = null;
        let mapInstance = null;
        let markerInstance = null;
        
        const logoUrl = 'https://i.postimg.cc/TwHmsgBX/image.png';

        function getProductPrice(product, type) {
            if (product.isFixedPrice) return product.price;
            return type === 'meal' ? product.prices.meal : product.prices.classic;
        }

        function addToCart(product, quantity = 1, type = 'classic') {
            const price = getProductPrice(product, type);
            const cartId = product.isFixedPrice ? product.id : `${product.id}-${type}`;
            const nameSuffix = product.isFixedPrice ? '' : (type === 'meal' ? ' (وجبة)' : ' (ساندوتش)');
            
            const existing = cartItems.find(i => i.cartId === cartId);
            if (existing) {
                existing.quantity += quantity;
            } else {
                cartItems.push({ 
                    ...product, 
                    cartId,
                    cartName: product.nameAr + nameSuffix,
                    cartPrice: price,
                    type,
                    quantity 
                });
            }
            showToast('🍔 تم الإضافة إلى السلة');
            renderApp();
        }
        
        function updateCartQuantity(cartId, delta) {
            const idx = cartItems.findIndex(i => i.cartId === cartId);
            if (idx !== -1) {
                const newQty = cartItems[idx].quantity + delta;
                if (newQty <= 0) cartItems.splice(idx, 1);
                else cartItems[idx].quantity = newQty;
                renderApp();
            }
        }
        
        function clearCart() { cartItems = []; renderApp(); }
        function getCartTotal() { return cartItems.reduce((sum, i) => sum + (i.cartPrice * i.quantity), 0); }
        function getDeliveryFee() { return 30; }
        function getGrandTotal() { return getCartTotal() + getDeliveryFee(); }
        function getItemCount() { return cartItems.reduce((sum, i) => sum + i.quantity, 0); }
        function showToast(msg) { toastMessage = msg; renderApp(); setTimeout(() => { toastMessage = null; renderApp(); }, 2500); }
        
        function getFilteredProducts() {
            let res = PRODUCTS;
            if (activeCategory !== 'all') {
                res = res.filter(p => p.category === activeCategory);
            }
            if (searchTerm.trim()) {
                res = res.filter(p => p.nameAr.includes(searchTerm) || p.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }
            return res;
        }
        
        function openProductDetail(product) { 
            selectedProduct = product; 
            detailQuantity = 1; 
            selectedMealType = 'classic';
            currentScreen = 'detail'; 
            renderApp(); 
        }

        function goBackToHome() { currentScreen = 'home'; currentCheckoutStep = 0; renderApp(); }
        function proceedToCheckout() { currentCheckoutStep = 1; renderApp(); }
        function proceedToLocation() { currentCheckoutStep = 2; renderApp(); setTimeout(() => initMap(), 200); }
        function proceedToPayment() { currentCheckoutStep = 3; renderApp(); }
        function finalizeOrderAndClearCart() { clearCart(); currentCheckoutStep = 4; renderApp(); }
        function backToCart() { currentCheckoutStep = 0; renderApp(); }
        
        function initMap() {
            const mapContainer = document.getElementById('map');
            if (!mapContainer) return;
            if (mapInstance) { mapInstance.invalidateSize(); return; }
            try {
                mapInstance = L.map('map').setView([selectedLocation.lat, selectedLocation.lng], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(mapInstance);
                
                const hulkIcon = L.divIcon({
                    html: `<div style="background-color:#14A33B; border:2px solid white; border-radius:50%; width:20px; height:20px; box-shadow: 0 0 10px #14A33B;"></div>`,
                    className: '',
                    iconSize: [20, 20]
                });

                markerInstance = L.marker([selectedLocation.lat, selectedLocation.lng], { draggable: true, icon: hulkIcon }).addTo(mapInstance);
                
                markerInstance.on('dragend', () => {
                    const latlng = markerInstance.getLatLng();
                    selectedLocation = { lat: latlng.lat, lng: latlng.lng, address: `الموقع المحدد: ${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}` };
                    renderApp();
                });
                mapInstance.on('click', (e) => {
                    markerInstance.setLatLng(e.latlng);
                    selectedLocation = { lat: e.latlng.lat, lng: e.latlng.lng, address: `الموقع المحدد: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}` };

            if (currentScreen !== 'home') return '';
            return `
                <header class="px-4 sm:px-6 md:px-8 pt-4 pb-4 bg-darkBg/95 backdrop-blur-md sticky top-0 z-40 border-b border-gray-800">
                    <div class="flex justify-between items-center mb-4 max-w-7xl mx-auto">
                        <div class="flex items-center gap-3">
                            <img src="${logoUrl}" class="w-10 h-10 sm:w-12 sm:h-12 object-contain bg-black rounded-full border border-primary p-1">
                            <div>
                                <h1 class="text-primaryLight font-black leading-none tracking-wide text-lg sm:text-xl">HULK</h1>
                                <span class="text-white text-[10px] font-bold tracking-widest">SANDWICH</span>
                            </div>
                        </div>
                        <button class="w-10 h-10 rounded-full bg-secondary border border-gray-700 flex items-center justify-center">
                            <svg width="20" viewBox="0 0 24 24" fill="none" stroke="white"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        </button>
                    </div>
                    <div class="relative max-w-7xl mx-auto">
                        <svg class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400" width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="ابحث عن تشيكن، بيف، زنجر..." class="w-full bg-secondary border border-gray-800 rounded-xl py-3 pr-12 pl-4 text-sm text-white placeholder-gray-500 focus:border-primary focus:outline-none transition-colors" id="global-search" value="${searchTerm}">
                    </div>
                </header>`;
        }
        
        function BottomNav() {
            if (currentScreen !== 'home' && currentScreen !== 'cart' && currentCheckoutStep === 0) return '';
            if (currentCheckoutStep > 0) return '';
            
            const isHome = currentScreen === 'home';
            const isCart = currentScreen === 'cart';
            
            return `
                <nav class="bottom-nav">
                    <div class="flex flex-col items-center cursor-pointer transition-colors ${isHome ? 'text-primaryLight' : 'text-gray-500'}" data-nav="home">
                        <svg width="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H7v8H5a2 2 0 0 1-2-2z"/></svg>
                        <span class="text-[10px] font-bold mt-1">المنيو</span>
                    </div>
                    
                    <div class="flex flex-col items-center cursor-pointer relative transition-colors ${isCart ? 'text-primaryLight' : 'text-gray-500'}" data-nav="cart">
                        <svg width="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="text-[10px] font-bold mt-1">السلة</span>
                        ${getItemCount() ? `<span class="absolute -top-2 -right-1 bg-primary text-black text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-secondary animate-bounce">${getItemCount()}</span>` : ''}
                    </div>
                </nav>`;
        }
        
        function ToastMessage() { 
            return toastMessage ? `
                <div class="fixed top-20 left-1/2 -translate-x-1/2 z-[9998] bg-primary text-black px-6 py-3 rounded-full shadow-[0_5px_15px_rgba(20,163,59,0.5)] font-bold text-sm animate-fade-in whitespace-nowrap">
                    ${toastMessage}
                </div>` : ''; 
        }

        function renderApp() {
            if (!renderRoot) return;
            
            if (currentScreen === 'splash') {
                renderRoot.innerHTML = SplashScreen();
                setTimeout(() => { currentScreen = 'home'; renderApp(); }, 2000);
                return;
            }
            
            let mainContent = '';
            if (currentScreen === 'home') mainContent = HomeScreen();
            else if (currentScreen === 'detail') mainContent = DetailScreen();
            else if (currentScreen === 'cart' || currentCheckoutStep > 0) {
                if (currentCheckoutStep === 0) mainContent = CartScreen();
                else if (currentCheckoutStep === 1) mainContent = ConfirmOrderScreen();
                else if (currentCheckoutStep === 2) mainContent = LocationPickerScreen();
                else if (currentCheckoutStep === 3) mainContent = PaymentScreen();
                else if (currentCheckoutStep === 4) mainContent = SuccessScreen();
            }
            
            renderRoot.innerHTML = `
                ${Header()}
                ${mainContent}
                ${BottomNav()}
                ${ToastMessage()}
            `;
            
            attachEvents();
            if (currentCheckoutStep === 2) setTimeout(initMap, 150);
        }
        
        function attachEvents() {
            const searchInput = document.getElementById('global-search');
            if (searchInput) {
                searchInput.oninput = (e) => { 
                    searchTerm = e.target.value; 
                    if(currentScreen === 'home') renderApp(); 
                };
            }
            
            document.querySelectorAll('[data-action="set-category"]').forEach(btn => {
                btn.onclick = () => { 
                    activeCategory = btn.dataset.category; 
                    searchTerm = ''; 
                    renderApp(); 
                };
            });
            
            document.querySelectorAll('[data-action="view-detail"]').forEach(el => {
                el.onclick = () => { 
                    const p = PRODUCTS.find(p => p.id === parseInt(el.dataset.productId)); 
                    if(p) openProductDetail(p); 
                };
            });
            
            document.querySelectorAll('[data-action="quick-add"]').forEach(btn => {
                btn.onclick = (e) => { 
                    e.stopPropagation(); 
                    const p = PRODUCTS.find(p => p.id === parseInt(btn.dataset.id)); 
                    if(p) {
                        addToCart(p, 1, 'classic'); 
                    }
                };
            });
            
            document.querySelectorAll('[data-action="set-type"]').forEach(btn => {
                btn.onclick = () => { 
                    selectedMealType = btn.dataset.type; 
                    renderApp(); 
                };
            });
            
            document.querySelectorAll('[data-action="incr-qty"]').forEach(btn => btn.onclick = () => { detailQuantity++; renderApp(); });
            document.querySelectorAll('[data-action="decr-qty"]').forEach(btn => btn.onclick = () => { if(detailQuantity>1) detailQuantity--; renderApp(); });
            
            document.querySelectorAll('[data-action="add-to-cart-detail"]').forEach(btn => {
                btn.onclick = () => { 
                    addToCart(selectedProduct, detailQuantity, selectedMealType); 
                    goBackToHome(); 
                };
            });
            
            document.querySelectorAll('[data-action="cart-inc"]').forEach(btn => btn.onclick = () => updateCartQuantity(btn.dataset.id, 1));
            document.querySelectorAll('[data-action="cart-dec"]').forEach(btn => btn.onclick = () => updateCartQuantity(btn.dataset.id, -1));
            
            document.querySelectorAll('[data-nav="home"]').forEach(btn => btn.onclick = goBackToHome);
            document.querySelectorAll('[data-nav="cart"]').forEach(btn => btn.onclick = () => { currentScreen = 'cart'; currentCheckoutStep = 0; renderApp(); });
            
            document.querySelectorAll('[data-action="back-home"]').forEach(btn => btn.onclick = goBackToHome);
            
            document.querySelectorAll('[data-action="proceed-to-checkout"]').forEach(btn => btn.onclick = proceedToCheckout);
            document.querySelectorAll('[data-action="confirm-order-location"]').forEach(btn => btn.onclick = proceedToLocation);
            document.querySelectorAll('[data-action="confirm-location-payment"]').forEach(btn => btn.onclick = proceedToPayment);
            document.querySelectorAll('[data-action="finalize-order"]').forEach(btn => btn.onclick = finalizeOrderAndClearCart);
            
            document.querySelectorAll('[data-action="back-to-cart"]').forEach(btn => btn.onclick = backToCart);
            document.querySelectorAll('[data-action="back-to-confirm"]').forEach(btn => btn.onclick = () => { currentCheckoutStep = 1; renderApp(); });
            document.querySelectorAll('[data-action="back-to-location"]').forEach(btn => btn.onclick = () => { currentCheckoutStep = 2; renderApp(); setTimeout(initMap, 150); });
            
            document.querySelectorAll('[data-payment]').forEach(el => el.onclick = () => { selectedPayment = el.dataset.payment; renderApp(); });
        }
        
        window.onload = () => { 
            renderRoot = document.getElementById('root'); 
            renderApp(); 
        };
    </script>
</body>
</html>
