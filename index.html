        // ---------- HELPERS ----------
        function getProductPrice(product, type) {
            if (product.isFixedPrice) return product.price;
            return type === 'meal' ? product.prices.meal : product.prices.classic;
        }

        function addToCart(product, quantity = 1, type = 'classic') {
            const price = getProductPrice(product, type);
            const cartId = product.isFixedPrice ? product.id : `${product.id}-${type}`;
            const nameSuffix = product.isFixedPrice ? '' : (type === 'meal' ? ' (وجبة)' : ' (ساندوتش)');
            const existing = cartItems.find(i => i.cartId === cartId);
            if (existing) {
                existing.quantity += quantity;
            } else {
                cartItems.push({ 
                    ...product, 
                    cartId,
                    cartName: product.nameAr + nameSuffix,
                    cartPrice: price,
                    type,
                    quantity 
                });
            }
            showToast('🍔 تم الإضافة إلى السلة');
            renderApp();
        }

        function updateCartQuantity(cartId, delta) {
            const idx = cartItems.findIndex(i => i.cartId === cartId);
            if (idx !== -1) {
                const newQty = cartItems[idx].quantity + delta;
                if (newQty <= 0) cartItems.splice(idx, 1);
                else cartItems[idx].quantity = newQty;
                renderApp();
            }
        }

        function getCartTotal() { return cartItems.reduce((sum, i) => sum + (i.cartPrice * i.quantity), 0); }
        function getItemCount() { return cartItems.reduce((sum, i) => sum + i.quantity, 0); }

            let res = PRODUCTS;
            if (activeCategory !== 'all') res = res.filter(p => p.category === activeCategory);
            if (searchTerm.trim()) res = res.filter(p => p.nameAr.includes(searchTerm) || p.name.toLowerCase().includes(searchTerm.toLowerCase()));
            return res;

        function finalizeOrderAndSendWhatsApp() {
            const name = document.getElementById('address-name')?.value || '';
            const area = document.getElementById('address-area')?.value || '';
            const phone = document.getElementById('address-phone')?.value || '';
            
            if (!name.trim()) { showToast('⚠️ من فضلك أدخل اسمك'); return; }
            if (!area.trim()) { showToast('⚠️ من فضلك أدخل المنطقة'); return; }
            if (!phone.trim()) { showToast('⚠️ من فضلك أدخل رقم الهاتف'); return; }

            addressData.name = name;
            addressData.area = area;
            addressData.street = document.getElementById('address-street')?.value || '';
            addressData.building = document.getElementById('address-building')?.value || '';
            addressData.landmark = document.getElementById('address-landmark')?.value || '';
            addressData.phone = phone;

            let itemsStr = cartItems.map(i => `• ${i.quantity}x ${i.cartName} (${i.cartPrice}ج.م)`).join('\n');
            let total = getCartTotal();
            let addressStr = `👤 الاسم: ${addressData.name}\n📍 المنطقة: ${addressData.area}\n🏠 الشارع: ${addressData.street || 'غير محدد'}\n🏢 المبنى: ${addressData.building || 'غير محدد'}\n🗺️ معلم: ${addressData.landmark || 'غير محدد'}\n📱 الهاتف: ${addressData.phone}`;
            
            let msg = `🍔 *طلب جديد من HULK SANDWICH* 🍔\n\n📋 *المنتجات:*\n${itemsStr}\n\n💰 *الإجمالي:* ${total} ج.م\n\n📍 *بيانات العميل:*\n${addressStr}\n\n🆔 *رقم الطلب:* ${orderNumber}`;
            
            const loading = document.getElementById('whatsapp-loading');
            loading.classList.add('active');
            
            try {
                const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
                window.open(url, '_blank');
                
                setTimeout(() => {
                    loading.classList.remove('active');
                }, 2500);
                
                setTimeout(() => {
                    currentCheckoutStep = 3;
                    renderApp();
                }, 2000);
                
            } catch(e) {
                loading.classList.remove('active');
                showToast('⚠️ حدث خطأ، حاول مرة أخرى');
            }
        }

                        </div>
                        <h2 class="text-3xl font-black text-white mb-2 neon-text">تم إرسال طلبك!</h2>
                        <p class="text-gray-300 mb-8">سيتم التواصل معك عبر واتساب لتأكيد الطلب</p>
                        <div class="glass rounded-2xl p-6 w-full mb-8">
                            <p class="text-xs text-gray-400 mb-1">🆔 رقم الطلب</p>
                            <p class="text-2xl font-black text-primaryLight tracking-widest mb-4">${orderNumber}</p>
                            <div class="w-full bg-gray-800 h-px mb-4"></div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-400">📱 تم الإرسال إلى</span>
                                <span class="font-bold text-white">${WHATSAPP_NUMBER}</span>
                            </div>
                        </div>
                        <button class="w-full btn-primary text-white py-4 rounded-xl font-black text-lg transition-all duration-300" data-action="back-home">🏠 العودة للرئيسية</button>
                    </div>
                </div>`;
        }

        // ---------- HEADER / BOTTOM NAV ----------
        function Header() {
            if (currentScreen !== 'home') return '';
            return `
                <header class="px-4 sm:px-6 md:px-8 pt-4 pb-3 bg-black/95 backdrop-blur-md sticky top-0 z-40 border-b border-gray-800/50">
                    <div class="flex justify-between items-center mb-4 max-w-7xl mx-auto">
                        <div class="flex items-center gap-3">
                            <img src="${logoUrl}" class="w-11 h-11 sm:w-13 sm:h-13 object-contain bg-black rounded-full border-2 border-primary p-1 shadow-[0_0_20px_rgba(20,163,59,0.2)]">
                            <div>
                                <h1 class="text-primaryLight font-black leading-none tracking-wide text-lg sm:text-xl neon-text">HULK</h1>
                                <span class="text-white/60 text-[9px] font-bold tracking-[0.2em]">SANDWICH</span>
                            </div>
                        </div>
                        <button class="w-11 h-11 rounded-full bg-secondary/80 backdrop-blur-sm border border-gray-700 flex items-center justify-center hover:border-primary/50 transition-all duration-300">
                            <svg width="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        </button>
                    </div>
                    <div class="relative max-w-7xl mx-auto">
                        <svg class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500" width="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="ابحث عن تشيكن، بيف، زنجر..." class="w-full bg-secondary/60 backdrop-blur-sm border-2 border-gray-800 rounded-xl py-3.5 pr-12 pl-4 text-sm text-white placeholder-gray-500 focus:border-primary outline-none transition-all duration-300" id="global-search" value="${searchTerm}">
                    </div>
                </header>`;
        }

        function BottomNav() {
            if (currentScreen !== 'home' && currentScreen !== 'cart' && currentCheckoutStep === 0) return '';
            if (currentCheckoutStep > 0) return '';
            const isHome = currentScreen === 'home';
            const isCart = currentScreen === 'cart';
            return `
                <nav class="bottom-nav">
                    <div class="flex flex-col items-center cursor-pointer transition-all duration-300 ${isHome ? 'text-primaryLight' : 'text-gray-500 hover:text-white'}" data-nav="home">
                        <svg width="26" viewBox="0 0 24 24" fill="${isHome ? '#14A33B' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-8H7v8H5a2 2 0 0 1-2-2z"/></svg>
                        <span class="text-[10px] font-bold mt-1">المنيو</span>
                    </div>
                    <div class="flex flex-col items-center cursor-pointer relative transition-all duration-300 ${isCart ? 'text-primaryLight' : 'text-gray-500 hover:text-white'}" data-nav="cart">
                        <svg width="26" viewBox="0 0 24 24" fill="${isCart ? '#14A33B' : 'none'}" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="text-[10px] font-bold mt-1">السلة</span>
                        ${getItemCount() ? `<span class="absolute -top-1 -right-1 bg-gradient-to-r from-primary to-primaryDark text-white text-[10px] font-bold w-5.5 h-5.5 rounded-full flex items-center justify-center border-2 border-black shadow-lg animate-bounce">${getItemCount()}</span>` : ''}
                    </div>
                </nav>`;
        }

        function ToastMessage() { 
            return toastMessage ? `
                <div class="fixed top-20 left-1/2 -translate-x-1/2 z-[9998] toast text-white px-8 py-3.5 rounded-full shadow-[0_8px_40px_rgba(20,163,59,0.4)] font-bold text-sm animate-fade-in whitespace-nowrap border border-primaryLight/20">
                    ${toastMessage}
                </div>` : ''; 
        }

        // ---------- RENDER ----------
        function renderApp() {
            if (!renderRoot) return;
            if (currentScreen === 'splash') {
                renderRoot.innerHTML = SplashScreen();
                setTimeout(() => { currentScreen = 'home'; renderApp(); }, 2000);
                return;
            }
            let mainContent = '';
            if (currentScreen === 'home') mainContent = HomeScreen();
            else if (currentScreen === 'detail') mainContent = DetailScreen();
            else if (currentScreen === 'cart' || currentCheckoutStep > 0) {
                if (currentCheckoutStep === 0) mainContent = CartScreen();
                else if (currentCheckoutStep === 1) mainContent = ConfirmOrderScreen();
                else if (currentCheckoutStep === 2) mainContent = AddressScreen();
                else if (currentCheckoutStep === 3) mainContent = SuccessScreen();
            }
            renderRoot.innerHTML = `
                ${Header()}
                ${mainContent}
                ${BottomNav()}
                ${ToastMessage()}
            `;
            attachEvents();
        }

        // ---------- EVENTS ----------
        function attachEvents() {
            const searchInput = document.getElementById('global-search');
            if (searchInput) {
                searchInput.oninput = (e) => { searchTerm = e.target.value; if(currentScreen === 'home') renderApp(); };
            }

            document.querySelectorAll('[data-action="set-category"]').forEach(btn => {
                btn.onclick = () => { activeCategory = btn.dataset.category; searchTerm = ''; renderApp(); };
            });

            document.querySelectorAll('[data-action="view-detail"]').forEach(el => {
                el.onclick = () => { const p = PRODUCTS.find(p => p.id === parseInt(el.dataset.productId)); if(p) openProductDetail(p); };
            });

            document.querySelectorAll('[data-action="quick-add"]').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); const p = PRODUCTS.find(p => p.id === parseInt(btn.dataset.id)); if(p) addToCart(p, 1, 'classic'); };
            });

            document.querySelectorAll('[data-action="set-type"]').forEach(btn => {
                btn.onclick = () => { selectedMealType = btn.dataset.type; renderApp(); };
            });

            document.querySelectorAll('[data-action="incr-qty"]').forEach(btn => btn.onclick = () => { detailQuantity++; renderApp(); });
            document.querySelectorAll('[data-action="decr-qty"]').forEach(btn => btn.onclick = () => { if(detailQuantity>1) detailQuantity--; renderApp(); });

            document.querySelectorAll('[data-action="add-to-cart-detail"]').forEach(btn => {
                btn.onclick = () => { addToCart(selectedProduct, detailQuantity, selectedMealType); goBackToHome(); };
            });

            document.querySelectorAll('[data-action="cart-inc"]').forEach(btn => btn.onclick = () => updateCartQuantity(btn.dataset.id, 1));
            document.querySelectorAll('[data-action="cart-dec"]').forEach(btn => btn.onclick = () => updateCartQuantity(btn.dataset.id, -1));

            document.querySelectorAll('[data-nav="home"]').forEach(btn => btn.onclick = goBackToHome);
            document.querySelectorAll('[data-nav="cart"]').forEach(btn => btn.onclick = () => { currentScreen = 'cart'; currentCheckoutStep = 0; renderApp(); });
            document.querySelectorAll('[data-action="back-home"]').forEach(btn => btn.onclick = goBackToHome);
            document.querySelectorAll('[data-action="proceed-to-checkout"]').forEach(btn => btn.onclick = proceedToCheckout);
            document.querySelectorAll('[data-action="back-to-cart"]').forEach(btn => btn.onclick = backToCart);
            document.querySelectorAll('[data-action="back-to-confirm"]').forEach(btn => btn.onclick = () => { currentCheckoutStep = 1; renderApp(); });
            document.querySelectorAll('[data-action="confirm-order-address"]').forEach(btn => btn.onclick = proceedToAddress);

            document.querySelectorAll('[data-action="finalize-order-whatsapp"]').forEach(btn => {
                btn.onclick = finalizeOrderAndSendWhatsApp;
            });
        }

        // ---------- INIT ----------
        window.onload = () => { 
            renderRoot = document.getElementById('root'); 
            renderApp(); 
        };
    </script>
</body>
</html>
